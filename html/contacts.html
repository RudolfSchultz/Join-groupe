<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/icons/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/icons/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../assets/icons/favicon/site.webmanifest" />
    <link rel="stylesheet" href="../style.css">

    <title>Contacts</title>
</head>

<body class="app-page" onload="init()">
    <div data-import="../html/nav_template.html"></div>
    <div class="main-wrapper">


        <main class="contacts-main">

            <section class="contacts-split-left">

                <div class="contacts-list">
                    <div class="btn-add-contact">
                        <button type="button" onclick="openAddContactModal()">
                            <span class="for-mobile-hide">Add new contact</span>
                            <img src="../assets/icons/person_add.svg" alt="Add Contact" class="fab-icon">
                        </button>
                    </div>
                    <div class="contact-item-placeholder" id="contacts-list-import">
                        No contacts yet. Add your first contact!</div>
                </div>
            </section>

            <section class="contacts-split-right for-mobile-hide">

                <div class="brand-header">
                    <h1 class="brand-title">Contacts</h1>
                    <div class="brand-divider"></div>
                    <span class="brand-subtitle">Better with a team</span>
                </div>

                <div class="contact-profile" id="contact-details-view" role="complementary"
                    aria-labelledby="details-heading">
                </div>
            </section>
        </main>
    </div>

    <dialog id="add-contact-dialog" onclick="closeDialog()">
    </dialog>



    <script src="../assets/templates/contacts_template.js"></script>
    <script src="../js/contacts.js"></script>
    <script src="../script.js"></script>


</body>

</html>
