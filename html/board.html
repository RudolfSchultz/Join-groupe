<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/icons/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/icons/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../assets/icons/favicon/site.webmanifest" />
    <link rel="stylesheet" href="../style.css">
    <title>Board</title>
</head>

<body onload="init(); initTasks();">
    <!--  <div data-import="../html/nav_template.html"></div> -->
    <div class="header-background">
        <header class="header">
            <span class="header-titel">Kanban Projekt Management Tool</span>
            <img src="../assets/img/logo_big.svg" class="header-logo-mobil" alt="Join">

            <div class="header-account">
                <a href="../html/help.html" class="help-icon-link" title="Hilfe">
                    <img src="../assets/icons/help.svg" alt="View help" class="help-icon">
                </a>

                <div class="avatar-wrapper" id="user-avatar-wrapper" onclick="toggleAvatarMenu()">
                    <div class="user-avatar" id="user-avatar"></div>
                    <div class="avatar-dropdown d-none" id="avatar-menu">
                        <button class="avatar-menu-btn"
                            onclick="window.location.href='privacy_policy.html'; event.stopPropagation()">Privacy
                            Policy</button>
                        <button class="avatar-menu-btn"
                            onclick="window.location.href='legal_notice.html'; event.stopPropagation()">Legal
                            Notice</button>
                        <button class="avatar-menu-btn" onclick="logout(); event.stopPropagation()">Log out</button>
                    </div>
                </div>
            </div>
        </header>
    </div>
    <nav class="sidebar">
        <a href="../html/summary.html" class="sidebar-logo-link">
            <img src="../assets/img/logo_white.svg" alt="Join Logo" class="sidebar-logo">
        </a>

        <div class="navigation-links-group">
            <a href="../html/summary.html" class="nav-link" id="nav_overview">
                <img src="../assets/icons/summary.svg" alt="" class="nav-icon">
                <span>Summary</Summary></span>
            </a>
            <a href="../html/add_task.html" class="nav-link" id="nav_addtask">
                <img src="../assets/icons/add_task.svg" alt="" class="nav-icon">
                <span>Add Task</span>
            </a>
            <a href="../html/board.html" class="nav-link" id="nav_board">
                <img src="../assets/icons/board.svg" alt="" class="nav-icon">
                <span>Board</span>
            </a>
            <a href="../html/contacts.html" class="nav-link" id="nav_contacts">
                <img src="../assets/icons/contacts.svg" alt="" class="nav-icon">
                <span>Contacts</span>
            </a>
        </div>

        <div class="nav-bottom-left">
            <a href="../html/privacy_policy.html" class="nav-link">Privacy Policy</a>
            <a href="../html/legal_notice.html" class="nav-link">Legal Notice</a>
        </div>
    </nav>

    <nav class="mobil-navigation">
        <a href="../html/summary.html" class="mobil-nav-link">
            <img src="../assets/icons/summary.svg" alt="" class="mobil-nav-icon">
            <span>Summary</span>
        </a>
        <a href="../html/add_task.html" class="mobil-nav-link">
            <img src="../assets/icons/add_task.svg" alt="" class="mobil-nav-icon">
            <span>Add Task</span>
        </a>
        <a href="../html/board.html" class="mobil-nav-link">
            <img src="../assets/icons/board.svg" alt="" class="mobil-nav-icon">
            <span>Board</span>
        </a>
        <a href="../html/contacts.html" class="mobil-nav-link">
            <img src="../assets/icons/contacts.svg" alt="" class="mobil-nav-icon">
            <span>Contacts</span>
        </a>
    </nav>

    <div class="landscape-warning">
        <img src="../assets/img/logo_big.svg" alt="Join">
        <p>Please turn your device to portrait mode.</p>
    </div>

    <main class="board-main">
        <div class="board-header">
            <h1 class="page-title">Board</h1>
            <div class="board-controls">
                <div class="search-wrapper">
                    <input class="search-input" type="text" id="board-search" placeholder="Find Task"
                        oninput="filterTasks()">
                    <div class="search-divider"></div>
                    <button class="search-icon-btn" aria-label="Suchen">
                        <svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M20.5 18.5H19.71L19.43 18.23C20.63 16.83 21.25 14.92 20.88 12.89C20.37 10.11 18.06 7.89 15.27 7.49C11.01 6.9 7.39 10.51 7.99 14.77C8.39 17.56 10.61 19.87 13.39 20.38C15.42 20.75 17.33 20.13 18.73 18.93L19 19.21V20L23.25 24.25C23.66 24.66 24.33 24.66 24.74 24.25C25.15 23.84 25.15 23.17 24.74 22.76L20.5 18.5ZM14.5 18.5C12.01 18.5 10 16.49 10 14C10 11.51 12.01 9.5 14.5 9.5C16.99 9.5 19 11.51 19 14C19 16.49 16.99 18.5 14.5 18.5Z"
                                fill="#2A3647" />
                        </svg>
                    </button>
                </div>
                <button class="btn-add-task" onclick="openAddTaskModal()">
                    <span class="btn-add-task-text">Add task</span>
                    <svg class="btn-add-task-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 1V19" stroke="white" stroke-width="2" stroke-linecap="round" />
                        <path d="M1 10H19" stroke="white" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="board-columns">
            <div class="board-col">
                <div class="board-col-header">
                    <span>To do</span>
                    <button class="col-add-btn" aria-label="Task hinzufügen" onclick="openAddTaskModal('todo')">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <path d="M7.5 1V14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                            <path d="M1 7.5H14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <div class="board-cards" id="todo" ondrop="moveTo('todo')"
                    ondragover="allowDrop(event); highlight('todo')" ondragleave="removeHighlight('todo')">
                </div>
            </div>

            <div class="board-col">
                <div class="board-col-header">
                    <span>In progress</span>
                    <button class="col-add-btn" aria-label="Task hinzufügen" onclick="openAddTaskModal('inProgress')">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <path d="M7.5 1V14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                            <path d="M1 7.5H14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <div class="board-cards" id="inProgress" ondrop="moveTo('inProgress')"
                    ondragover="allowDrop(event); highlight('inProgress')" ondragleave="removeHighlight('inProgress')">
                </div>
            </div>

            <div class="board-col">
                <div class="board-col-header">
                    <span>Await feedback</span>
                    <button class="col-add-btn" aria-label="Task hinzufügen"
                        onclick="openAddTaskModal('awaitFeedback')">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <path d="M7.5 1V14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                            <path d="M1 7.5H14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <div class="board-cards" id="awaitFeedback" ondrop="moveTo('awaitFeedback')"
                    ondragover="allowDrop(event); highlight('awaitFeedback')"
                    ondragleave="removeHighlight('awaitFeedback')">
                </div>
            </div>

            <div class="board-col">
                <div class="board-col-header">
                    <span>Done</span>
                </div>
                <div class="board-cards" id="done" ondrop="moveTo('done')"
                    ondragover="allowDrop(event); highlight('done')" ondragleave="removeHighlight('done')">
                </div>
            </div>
        </div>
    </main>

    <!-- Task Detail / Edit Overlay -->
    <div class="board-overlay d-none" id="board-overlay" onclick="handleOverlayClick(event)">
        <div class="board-modal" onclick="event.stopPropagation()">
            <div id="board-detail-box"></div>
            <div id="board-edit-box" class="d-none"></div>
        </div>
    </div>

    <!-- Add Task Modal is injected by assets/templates/board_template.js -->

    <div id="notification" class="notification d-none"></div>
    <script src="../assets/templates/board_template.js"></script>
    <script src="../js/board_drag.js"></script>
    <script src="../js/add_task_board.js"></script>
    <script src="../js/board_progressbar.js"></script>
    <script src="../js/board_overlay.js"></script>
    <script src="../js/board_open_modal.js"></script>
    <script src="../js/board_save_task.js"></script>
    <script src="../js/board.js"></script>
    <script src="../script.js"></script>
</body>

</html>
