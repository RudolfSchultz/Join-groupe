<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/icons/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/icons/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../assets/icons/favicon/site.webmanifest" />
    <link rel="stylesheet" href="../assets/css/fonts.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/css/shared.css">
    <link rel="stylesheet" href="../assets/css/add_task.css">
    <title>Add Task</title>
</head>
<body class="app-page">

    <aside class="sidebar">
        <a href="../index.html" class="sidebar-logo-link">
            <img class="sidebar-logo" src="../assets/img/logo_white.svg" alt="Join">
        </a>
        <nav class="sidebar-nav">
            <a href="summary.html" class="nav-item">
                <img src="../assets/icons/summary.svg" alt="" class="nav-icon">
                <span>Summary</span>
            </a>
            <a href="add_task.html" class="nav-item nav-item--active">
                <img src="../assets/icons/add_task.svg" alt="" class="nav-icon">
                <span>Add Task</span>
            </a>
            <a href="board.html" class="nav-item">
                <img src="../assets/icons/board.svg" alt="" class="nav-icon">
                <span>Board</span>
            </a>
            <a href="contacts.html" class="nav-item">
                <img src="../assets/icons/contacts.svg" alt="" class="nav-icon">
                <span>Contacts</span>
            </a>
        </nav>
        <footer class="sidebar-footer">
            <a href="privacy_policy.html" class="sidebar-footer-link">Privacy Policy</a>
            <a href="legal_notice.html" class="sidebar-footer-link">Legal Notice</a>
        </footer>
    </aside>

    <div class="main-wrapper">

        <header class="main-header">
            <span class="header-title">Kanban Project Management Tool</span>
            <div class="header-actions">
                <a href="help.html" class="help-link">
                    <img src="../assets/icons/help.svg" alt="Help" class="help-icon">
                </a>
                <div class="user-avatar">SM</div>
            </div>
        </header>

        <main class="add-task-main">
            <h1 class="page-title">Add Task</h1>

            <form class="task-form" onsubmit="return false;">

                <div class="form-columns">
                    <div class="form-col">

                        <div class="form-group">
                            <label class="form-label" for="task-title">Title <span class="required">*</span></label>
                            <input class="form-input" type="text" id="task-title" placeholder="Enter a title">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="task-desc">Description</label>
                            <textarea class="form-input form-textarea" id="task-desc" placeholder="Enter a description"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="task-due">Due date <span class="required">*</span></label>
                            <div class="form-input-icon">
                                <input class="form-input" type="date" id="task-due">
                                <img src="../assets/icons/event.svg" alt="" class="input-icon">
                            </div>
                        </div>

                    </div>

                    <div class="form-divider-vertical"></div>

                    <div class="form-col">

                        <div class="form-group">
                            <label class="form-label">Prio</label>
                            <div class="prio-buttons">
                                <button type="button" class="prio-btn prio-urgent">
                                    Urgent
                                    <svg width="16" height="12" viewBox="0 0 21 16" fill="none">
                                        <path d="M19.2927 15.3906C19.0097 15.3906 18.7267 15.2836 18.5117 15.0756L10.4997 7.48462L2.48772 15.0756C2.05272 15.4936 1.35272 15.4816 0.933719 15.0486C0.514719 14.6136 0.526719 13.9156 0.961719 13.4956L9.73672 5.14362C10.1647 4.73262 10.8357 4.73262 11.2627 5.14362L20.0377 13.4956C20.4727 13.9156 20.4847 14.6136 20.0657 15.0486C19.8487 15.2756 19.5707 15.3906 19.2927 15.3906Z" fill="#FF3D00"/>
                                        <path d="M19.2927 9.69055C19.0097 9.69055 18.7267 9.58355 18.5117 9.37555L10.4997 1.78455L2.48772 9.37555C2.05272 9.79355 1.35272 9.78155 0.933719 9.34655C0.514719 8.91155 0.526719 8.21355 0.961719 7.79355L9.73672 -0.556448C10.1647 -0.967448 10.8357 -0.967448 11.2627 -0.556448L20.0377 7.79355C20.4727 8.21355 20.4847 8.91155 20.0657 9.34655C19.8487 9.57355 19.5707 9.69055 19.2927 9.69055Z" fill="#FF3D00"/>
                                    </svg>
                                </button>
                                <button type="button" class="prio-btn prio-medium prio-active">
                                    Medium
                                    <svg width="18" height="8" viewBox="0 0 18 8" fill="none">
                                        <path d="M16.5 7.5H1.5C0.672 7.5 0 6.828 0 6C0 5.172 0.672 4.5 1.5 4.5H16.5C17.328 4.5 18 5.172 18 6C18 6.828 17.328 7.5 16.5 7.5Z" fill="#FFA800"/>
                                        <path d="M16.5 3H1.5C0.672 3 0 2.328 0 1.5C0 0.672 0.672 0 1.5 0H16.5C17.328 0 18 0.672 18 1.5C18 2.328 17.328 3 16.5 3Z" fill="#FFA800"/>
                                    </svg>
                                </button>
                                <button type="button" class="prio-btn prio-low">
                                    Low
                                    <svg width="16" height="12" viewBox="0 0 21 16" fill="none">
                                        <path d="M10.4998 11.4C10.2168 11.4 9.93375 11.293 9.71875 11.077L0.943752 2.72498C0.508752 2.30498 0.496752 1.60698 0.915752 1.17198C1.33575 0.736984 2.03475 0.724984 2.46975 1.14498L10.4998 8.73498L18.5298 1.14498C18.9648 0.724984 19.6628 0.736984 20.0838 1.17198C20.5028 1.60698 20.4908 2.30498 20.0558 2.72498L11.2808 11.077C11.0658 11.293 10.7828 11.4 10.4998 11.4Z" fill="#7AE229"/>
                                        <path d="M10.4998 15.1001C10.2168 15.1001 9.93375 14.9931 9.71875 14.7771L0.943752 6.42509C0.508752 6.00509 0.496752 5.30709 0.915752 4.87209C1.33575 4.43709 2.03475 4.42509 2.46975 4.84509L10.4998 12.4351L18.5298 4.84509C18.9648 4.42509 19.6628 4.43709 20.0838 4.87209C20.5028 5.30709 20.4908 6.00509 20.0558 6.42509L11.2808 14.7771C11.0658 14.9931 10.7828 15.1001 10.4998 15.1001Z" fill="#7AE229"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="task-assigned">Assigned to</label>
                            <input class="form-input" type="text" id="task-assigned" placeholder="Select contacts to assign">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="task-category">Category <span class="required">*</span></label>
                            <input class="form-input" type="text" id="task-category" placeholder="Select task category">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="task-subtask">Subtasks</label>
                            <div class="form-input-icon">
                                <input class="form-input" type="text" id="task-subtask" placeholder="Add new subtask">
                                <img src="../assets/icons/add_task.svg" alt="" class="input-icon">
                            </div>
                        </div>

                    </div>
                </div>

                <div class="form-footer">
                    <span class="required-hint"><span class="required">*</span>This field is required</span>
                    <div class="form-actions">
                        <button type="button" class="btn-clear">Clear <span class="btn-x">✕</span></button>
                        <button type="submit" class="btn-create">
                            Create Task
                            <img src="../assets/icons/done.svg" alt="" class="btn-icon">
                        </button>
                    </div>
                </div>

            </form>
        </main>
    </div>

    <script src="../script.js"></script>
</body>
</html>
